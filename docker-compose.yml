services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: idempotencia-frontend:latest
    container_name: idempotencia-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - red-proxy
    mem_limit: 256m
    cpus: 0.5

networks:
  red-proxy:
    external: true
