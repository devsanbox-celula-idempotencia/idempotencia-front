services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.idempotencia.andrescortes.dev}
    image: idempotencia-frontend:latest
    container_name: idempotencia-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
