services:
  frontend-QA:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: idempotencia-frontend:latest
    container_name: idempotencia-frontend
    ports:
      - "${FRONTEND_PORT}"
    restart: unless-stopped
    networks:
      - red-proxy
    mem_limit: 256m
    cpus: 0.5

networks:
  red-proxy:
    external: true